<html lang="en">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --cream:#f3f1ec;
    --cream-2:#ece9e1;
    --ink:#1A1A1A;
    --soft:#6b6b66;
    --line:rgba(26,26,26,.12);
    --line-soft:rgba(26,26,26,.07);
    --card:#ffffff;
    --gold:#2f97ac;
    --gold-deep:#1c7288;
    --sage:#AECA96;
    --champagne:#E2D294;
    --blush:#E8C4CC;
    --powder:#C4D4E4;
    --shadow:0 18px 40px -26px rgba(60,50,30,.42);
    --shadow-soft:0 8px 22px -16px rgba(60,50,30,.38);
    --r:20px;
    --r-sm:14px;
    --maxw:720px;
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --appbar:96px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
  body{
    margin:0;font-family:var(--sans);color:var(--ink);background:var(--cream);
    line-height:1.55;font-weight:400;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden;
  }
  a{color:var(--gold-deep);text-decoration:none}
  a:hover{text-decoration:underline}
  img{max-width:100%}

  /* ---------- fixed app bar (single row: brand+date, then scrollable day nav) ---------- */
  .appbar{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:12px;
    background:color-mix(in srgb,var(--cream) 90%,transparent);
    backdrop-filter:saturate(1.2) blur(14px);-webkit-backdrop-filter:saturate(1.2) blur(14px);border-bottom:1px solid var(--line-soft);
    padding:8px max(12px,env(safe-area-inset-left)) 8px max(8px,env(safe-area-inset-right))}
  .brand{display:flex;align-items:baseline;gap:9px;flex:none;white-space:nowrap;
    background:none;border:0;padding:0;margin:0;cursor:pointer;color:inherit;font:inherit;-webkit-tap-highlight-color:transparent}
  .brand .mono{font-family:var(--serif);font-weight:600;letter-spacing:.4px;font-size:16px;white-space:nowrap}
  .brand .mono .amp{color:var(--gold);padding:0 2px;font-style:italic}

  .daynav{flex:1;min-width:0;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:2px 2px;-webkit-overflow-scrolling:touch}
  .daynav::-webkit-scrollbar{display:none}
  .dchip{flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
    min-width:30px;padding:3px 6px;border-radius:9px;background:var(--card);border:1px solid var(--line-soft);
    color:var(--ink);cursor:pointer;transition:.15s;line-height:1.1}
  .dchip:hover{border-color:var(--gold);text-decoration:none}
  .dchip b{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
  .dchip span{font-size:7px;font-weight:700;letter-spacing:.4px;color:var(--soft)}
  .dchip.active{background:var(--gold-deep);border-color:transparent}
  .dchip.active b,.dchip.active span{color:#fff}

  /* ---------- hero / logo header ---------- */
  .hero{text-align:center;padding:26px 22px 18px;display:flex;flex-direction:column;align-items:center}
  .hero .logo{width:min(200px,54vw);height:auto}
  .hero h1{font-family:var(--serif);font-weight:600;margin:6px 0 0;line-height:1.02;letter-spacing:1px;
    font-size:clamp(34px,9vw,52px);color:var(--gold-deep)}
  .hero h1 .amp{color:var(--gold);font-style:italic;font-weight:500}
  .hero .tagline{margin-top:9px;font-size:12.5px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--soft)}

  /* ---------- view dots (always visible) ---------- */
  .viewdots{display:flex;align-items:center;gap:12px;margin-top:16px}
  .vdot{width:12px;height:12px;border-radius:50%;padding:0;border:0;cursor:pointer;transition:.15s}
  .vdot:hover{transform:scale(1.2)}
  .vdot.host{background:var(--gold-deep)}
  .vdot.alvin{background:var(--blush)}
  .vdot.janice{background:var(--sage)}
  .vdot[aria-selected="true"]{transform:scale(1.35)}
  .vdot.host[aria-selected="true"]{box-shadow:0 0 0 3px color-mix(in srgb,var(--gold-deep) 40%,transparent)}
  .vdot.alvin[aria-selected="true"]{box-shadow:0 0 0 3px color-mix(in srgb,var(--blush) 60%,transparent)}
  .vdot.janice[aria-selected="true"]{box-shadow:0 0 0 3px color-mix(in srgb,var(--sage) 60%,transparent)}

  /* ---------- timeline ---------- */
  .wrap{max-width:var(--maxw);margin:0 auto;padding:6px 16px max(70px,45vh)}
  .seg-head{display:flex;align-items:center;gap:12px;margin:34px 4px 8px}
  .seg-head .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex:none}
  .seg-head h2{font-family:var(--serif);font-size:21px;font-weight:600;margin:0;letter-spacing:.3px}
  .seg-head .rng{color:var(--soft);font-size:12px;font-weight:600}
  .seg-head .rule{flex:1;height:1px;background:var(--line-soft)}

  .day{margin:14px 0;background:var(--card);border:1px solid var(--line-soft);border-radius:var(--r);
    box-shadow:var(--shadow-soft);overflow:hidden;scroll-margin-top:calc(var(--appbar) + 10px)}
  .day.today{border-color:var(--gold);box-shadow:0 0 0 2px color-mix(in srgb,var(--gold) 50%,transparent),var(--shadow)}
  .day-head{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--line-soft);
    background:linear-gradient(180deg,var(--cream),transparent)}
  .datechip{flex:none;width:48px;text-align:center;line-height:1}
  .datechip .d{font-family:var(--sans);font-size:25px;font-weight:800;color:var(--gold-deep);font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .datechip .m{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);margin-top:3px}
  .day-head .title{flex:1;min-width:0}
  .day-head .dow{font-size:11px;font-weight:700;color:var(--soft);letter-spacing:.6px;text-transform:uppercase}
  .day-head .head-name{font-size:16.5px;font-weight:700;margin-top:2px;line-height:1.25}
  .day-head .head-name .flag{margin-right:5px}
  .today-pill{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--ink);background:var(--champagne);padding:3px 8px;border-radius:999px;margin-left:6px;vertical-align:middle}
  .loc-pill{font-size:11px;font-weight:600;padding:4px 11px;border-radius:999px;white-space:nowrap;background:var(--cream);border:1px solid var(--line-soft);color:var(--soft)}
  .flag{font-size:16px}

  .events{padding:5px 14px 12px}
  .ev{display:flex;gap:13px;padding:12px 4px;position:relative}
  .ev + .ev{border-top:1px solid var(--line-soft)}
  .ev .chip{flex:none;width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:19px;background:var(--cream-2)}
  .ev.flight .chip{background:color-mix(in srgb,var(--powder) 55%,#fff)}
  .ev.hotel  .chip{background:color-mix(in srgb,var(--sage) 50%,#fff)}
  .ev.wedding .chip{background:color-mix(in srgb,var(--blush) 60%,#fff)}
  .ev.meal   .chip{background:color-mix(in srgb,var(--champagne) 55%,#fff)}
  .ev.activity .chip{background:color-mix(in srgb,var(--gold) 24%,#fff)}
  .ev .body{flex:1;min-width:0}
  .ev .etitle{font-weight:600;font-size:15.5px;line-height:1.3;color:var(--ink)}
  .ev .edesc{color:var(--soft);font-size:13.5px;margin-top:3px;line-height:1.5}

  .times{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px}
  .tchip{display:inline-flex;align-items:baseline;gap:6px;padding:5px 11px;border-radius:10px;
    background:color-mix(in srgb,var(--gold) 12%,#fff);border:1px solid color-mix(in srgb,var(--gold) 38%,transparent)}
  .tchip .tl{font-size:9.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--gold-deep)}
  .tchip .tv{font-size:14px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
  .tchip.arr{background:color-mix(in srgb,var(--sage) 24%,#fff);border-color:color-mix(in srgb,var(--sage) 60%,transparent)}
  .tchip.arr .tl{color:#5a7a48}

  .maplink{display:inline-flex;align-items:center;gap:6px;margin-top:9px;font-size:12.5px;font-weight:600;color:var(--ink);
    background:var(--card);border:1px solid var(--line);padding:6px 12px 6px 9px;border-radius:999px;box-shadow:var(--shadow-soft)}
  .maplink:hover{text-decoration:none;border-color:var(--gold)}
  .maplink svg{flex:none}

  .booking{margin-top:9px;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--gold-deep);
    background:color-mix(in srgb,var(--gold) 10%,#fff);border:1px dashed color-mix(in srgb,var(--gold) 55%,transparent);padding:4px 11px;border-radius:8px}

  .more-stays{border-top:1px solid var(--line-soft)}
  .more-stays summary{list-style:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;margin:12px 4px 2px;
    font-size:12.5px;font-weight:600;color:var(--soft);background:var(--cream);border:1px solid var(--line);padding:7px 14px;border-radius:999px;transition:.15s}
  .more-stays summary::-webkit-details-marker{display:none}
  .more-stays summary:hover{border-color:var(--gold);color:var(--gold-deep)}
  .more-stays summary .chev{transition:transform .2s}
  .more-stays[open] summary .chev{transform:rotate(180deg)}

  footer{text-align:center;color:var(--soft);font-size:13px;padding:34px 20px 46px}
  footer .fmono{font-family:var(--serif);font-size:24px;color:var(--gold-deep);display:block;margin-bottom:4px;font-weight:600}
  footer .heart{color:var(--blush)}
  ::selection{background:var(--gold);color:#fff}
</style>
</head>
<body>

      map:"https://maps.app.goo.gl/pxxfYCueYxAa5o8JA", booking:"官網 · Official site" },
  ]},

  { seg:4, d:"25", m:"Jul", dow:"Saturday", name:"Tahoe Trip", loc:"Lake Tahoe", flag:"🏔️", events:[
    { type:"hotel", icon:"🏡", title:"Townhouse in Tahoe City",
      desc:"Airbnb · hosted by Juan · Alvin + Janice + Alvin family (5) · 3101 Lake Forest Road, Tahoe City, CA 96145",
      times:[{l:"Check-in",v:"Sat Jul 25 · after 3:00 PM"},{l:"Check-out",v:"Sun Jul 26 · before 11:00 AM"}], groups:["aj","af"],
      map:"https://www.google.com/maps/search/?api=1&query=3101+Lake+Forest+Road+Tahoe+City+CA+96145" },
  ]},
  { seg:4, d:"26", m:"Jul", dow:"Sunday", name:"Tahoe Trip", loc:"Lake Tahoe", flag:"🏔️", events:[
    { type:"hotel", title:"Courtyard by Marriott Sunnyvale", desc:"Alvin 爸媽", groups:["af"],
      map:"https://maps.app.goo.gl/pxxfYCueYxAa5o8JA", booking:"官網 · Official site" },
  ]},
  { seg:5, d:"27", m:"Jul", dow:"Monday", name:"返家 · Homeward bound", loc:"Departure", flag:"🛫", events:[
    { type:"flight", title:"Alvin Family fly home — SFO → Taipei", desc:"半夜 · after-midnight departure · 返家",
      times:[{l:"Departs",v:"After midnight"}], groups:["af"] },
  ]},
];

const TYPE_ICON = { flight:"✈️", hotel:"🏨", wedding:"💍", meal:"🍽️", activity:"🌺" };
const MAP_PIN = '<svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path fill="#EA4335" d="M12 2C8.13 2 5 5.13 5 9c0 5.05 6.13 12.4 6.4 12.71a.8.8 0 0 0 1.2 0C12.87 21.4 19 14.05 19 9c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.6" fill="#fff"/></svg>';
const CHEV = '<svg class="chev" viewBox="0 0 24 24" width="13" height="13" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6"/></svg>';

/* ---------------- view logic ---------------- */
const VIEWS = {
  admin:  { key:"admin",  badge:"Host · Alvin", cls:"admin", own:null,
            greet:"<b>Welcome, host 👑</b> — you can see every booking and stay, and switch to preview each family's page." },
  alvin:  { key:"alvin",  badge:"Alvin's Family", cls:"", own:["af"],
            greet:"<b>Aloha, Alvin's Family! 🌺</b> — here's the full trip, from the wedding through Hawaii and Tahoe." },
  janice: { key:"janice", badge:"Janice's Family", cls:"", own:["jf"],
            greet:"<b>Aloha, Janice's Family! 🌴</b> — here's your itinerary through your flight home on Jul 23." },
};
function getView(){ const v=new URLSearchParams(location.search).get("v"); return VIEWS[v]?v:"admin"; }
let current = getView();

function visibleDays(view){
  if(view==="janice") return DAYS.filter(d => parseInt(d.d,10) <= 23);
  return DAYS;
}
function isOwnStay(view, groups){
  const own = VIEWS[view].own;
  if(!own) return true;
  if(groups.includes("all")) return true;
  return groups.some(g => own.includes(g));
}

function timesHTML(times){
  if(!times || !times.length) return "";
  return `<div class="times">` + times.map(t =>
    `<span class="tchip${t.arr?" arr":""}"><span class="tl">${t.l}</span><span class="tv">${t.v}</span></span>`).join("") + `</div>`;
}
function mapHTML(url){
  return url ? `<div><a class="maplink" href="${url}" target="_blank" rel="noopener">${MAP_PIN} Open in Maps</a></div>` : "";
}

/* pure family-attribution descs are redundant once the URL already picks a family —
   but that only holds for the viewer's OWN stay; the "other stay" section still needs
   the label since it's not the viewer's family and isn't identified by the URL. */
const REDUNDANT_DESC = new Set(["Alvin 爸媽", "Janice 爸媽"]);
function rowHTML(ev, view, forceDesc){
  const icon = ev.icon || TYPE_ICON[ev.type] || "•";
  const showDesc = ev.desc && (forceDesc || !(view!=="admin" && REDUNDANT_DESC.has(ev.desc)));
  const desc = showDesc ? `<div class="edesc">${ev.desc}</div>` : "";
  const booking = (view==="admin" && ev.booking) ? `<div class="booking">🎟️ ${ev.booking}</div>` : "";
  return `<div class="ev ${ev.type}">
    <div class="chip">${icon}</div>
    <div class="body">
      <div class="etitle">${ev.title}</div>
      ${desc}
      ${timesHTML(ev.times)}
      ${mapHTML(ev.map)}
      ${booking}
    </div>
  </div>`;
}

function dayHTML(day, view){
  const items  = day.events.filter(e => e.type !== "hotel");
  const hotels = day.events.filter(e => e.type === "hotel");
  const primary = hotels.filter(h => isOwnStay(view, h.groups) || h.force);
  const others  = hotels.filter(h => !(isOwnStay(view, h.groups) || h.force));

  let body = items.map(e => rowHTML(e, view)).join("");
  body += primary.map(h => rowHTML(h, view, h.force)).join("");
  if(others.length){
    body += `<details class="more-stays">
      <summary>${CHEV} View ${others.length} other stay${others.length>1?"s":""}</summary>
      ${others.map(h => rowHTML(h, view, true)).join("")}
    </details>`;
  }

  const today = isToday(day);
  return `<article class="day${today?" today":""}" id="day-${day.d}">
    <div class="day-head">
      <div class="datechip"><div class="d">${day.d}</div><div class="m">${day.m}</div></div>
      <div class="title">
        <div class="dow">${day.dow}</div>
        <div class="head-name"><span class="flag">${day.flag}</span> ${day.name}${today?' <span class="today-pill">Today</span>':''}</div>
      </div>
      <span class="loc-pill">📍 ${day.loc}</span>
    </div>
    <div class="events">${body}</div>
  </article>`;
}

/* today helpers (trip is all July 2026) */
function dayDate(day){ return new Date(2026, 6, parseInt(day.d,10)); }
function todayMidnight(){ const t=new Date(); t.setHours(0,0,0,0); return t; }
function isToday(day){ return dayDate(day).getTime() === todayMidnight().getTime(); }
function currentDay(days){
  const today = todayMidnight().getTime();
  let exact=null, upcoming=null;
  for(const d of days){
    const t = dayDate(d).getTime();
    if(t===today){ exact=d; break; }
    if(t>today && !upcoming){ upcoming=d; }
  }
  return exact || upcoming || days[days.length-1];
}

/* ---------------- render ---------------- */
let navChips = [];
function render(){
  const view = current;
  document.querySelectorAll("#viewdots .vdot").forEach(b=>b.setAttribute("aria-selected", b.dataset.v===view?"true":"false"));

  document.body.classList.toggle("guest", view!=="admin");

  const days = visibleDays(view);

  // day nav
  document.getElementById("daynav").innerHTML = days.map(d =>
    `<a class="dchip" data-day="${d.d}" href="#day-${d.d}"><b>${d.d}</b><span>${d.dow.slice(0,3).toUpperCase()}</span></a>`
  ).join("");

  // timeline
  let html = "", lastSeg = -1;
  days.forEach(day=>{
    if(day.seg!==lastSeg){
      const s = SEGMENTS[day.seg];
      html += `<div class="seg-head"><span class="dot"></span><h2>${s.name}</h2><span class="rng">${s.range}</span><span class="rule"></span></div>`;
      lastSeg = day.seg;
    }
    html += dayHTML(day, view);
  });
  document.getElementById("timeline").innerHTML = html;

  wireNav();
  return days;
}

function appbarH(){ const a=document.querySelector(".appbar"); return (a?a.offsetHeight:96); }
function scrollToDay(d, smooth){
  const el = document.getElementById("day-"+d); if(!el) return;
  const y = el.getBoundingClientRect().top + window.scrollY - appbarH() - 8;
  window.scrollTo({ top:Math.max(0,y), behavior: smooth===false ? "auto" : "smooth" });
}
function wireNav(){
  navChips = Array.from(document.querySelectorAll(".dchip"));
  navChips.forEach(c=> c.addEventListener("click", e=>{ e.preventDefault(); scrollToDay(c.dataset.day); }));
}
function spy(){
  if(!navChips.length) return;
  const mark = appbarH() + 24;
  const doc = document.documentElement;
  const atBottom = (window.innerHeight + window.scrollY) >= (doc.scrollHeight - 4);
  let activeDay = navChips[0].dataset.day;
  if(atBottom){
    activeDay = navChips[navChips.length-1].dataset.day;
  } else {
    for(const c of navChips){
      const el = document.getElementById("day-"+c.dataset.day);
      if(el && el.getBoundingClientRect().top <= mark) activeDay = c.dataset.day;
    }
  }
  navChips.forEach(c=>{
    const on = c.dataset.day===activeDay;
    if(on !== c.classList.contains("active")){
      c.classList.toggle("active", on);
      if(on) c.scrollIntoView({block:"nearest", inline:"center", behavior:"smooth"});
    }
  });
}

function setView(v){
  current = v;
  const u = new URL(location.href);
  if(v==="admin") u.searchParams.delete("v"); else u.searchParams.set("v", v);
  history.replaceState(null,"",u);
  render();
  window.scrollTo({top:0, behavior:"smooth"});
}

document.querySelectorAll("#viewdots .vdot").forEach(b=> b.addEventListener("click", ()=>setView(b.dataset.v)));
document.getElementById("brandBtn").addEventListener("click", ()=> window.scrollTo({top:0, behavior:"smooth"}));
window.addEventListener("scroll", ()=>{ window.requestAnimationFrame(spy); }, {passive:true});

const initialDays = render();
window.addEventListener("load", ()=>{
  const tripStarted = todayMidnight().getTime() >= new Date(2026,6,12).getTime();
  if(tripStarted){
    setTimeout(()=>{ scrollToDay(currentDay(initialDays).d); spy(); }, 250);
  } else {
    spy();
  }
});
</script>
</body>
